<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 홈페이지 제목 -->
    <title>웹프로그래밍 데모</title>
    <!-- css파일 링크하기 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 여기는 메뉴입니다 -->
    <nav class="navbar">
      <div class="container">
        <div class="logo">Webdemo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="about.html">About</a>
          </li>
          <li>
            <a href="contact.html">Contact</a>
          </li>
          <li>
            <a href="media.html">media</a>
          </li>
          <li>
            <a href="user.html">form</a>
          </li>
        </ul>
      </div>
    </nav>
    <!-- 메인 섹션 -->
    <section class="main">
      <div class="container">
        <h1>Profile(프로필)</h1>
        <form action="">
          <fieldset>
            <legend><h3>로그인정보</h3></legend>
            <label for="id">아이디 : </label>
            <input
              type="text"
              id="id"
              maxlength="18"
              minlength="8"
              size="15"
              placeholder="8~18자 이내"
            /><br />

            <label for="pass">패스워드 : </label>
            <input
              type="password"
              id="pass"
              size="15"
              placeholder="20자 이내"
            /><br />

            <input type="submit" value="로그인하기" />
            <input type="reset" value="리셋하기" />
          </fieldset>
          <br />

          <fieldset>
            <legend><h3>인적 사항</h3></legend>
            <label for="name">이름 : </label>
            <input type="text" id="name" placeholder="홍길동" size="7" /><br />
            <label for="age">나이 (8세~100세): </label>
            <input
              type="number"
              id="age"
              min="8"
              max="100"
              placeholder="0"
            /><br />
            <label for="birthday">생년월일 : </label>
            <input
              type="date"
              id="birthday"
              min="1926-12-31"
              max="2018-12-31"
            /><br />
            <label for="phonenum">휴대 전화 : </label>
            <input
              type="tel"
              id="phonenum"
              placeholder="010-1234-5678"
              size="15"
            /><br />
            <label for="email">이메일 주소 : </label>
            <input
              type="email"
              id="email"
              size="20"
              placeholder="example@sample.com"
            /><br />
          </fieldset>
          <br />

          <fieldset>
            <legend><h3>좋아하는 활동(중복 선택 가능)</h3></legend>
            <input type="checkbox" name="hobby" id="hobby1" />
            <label for="hobby1">등산 하기</label><br />
            <input type="checkbox" name="hobby" id="hobby2" />
            <label for="hobby2">게임 하기</label><br />
            <input type="checkbox" name="hobby" id="hobby3" />
            <label for="hobby3">책 읽기</label><br />
            <input type="checkbox" name="hobby" id="hobby4" />
            <label for="hobby">산책 하기</label><br />
          </fieldset>
          <br />

          <fieldset>
            <legend><h3>가장 좋아하는 동물</h3></legend>
            <input type="radio" id="dog" value="dog" />
            <label for="dog">강아지</label><br />
            <input type="radio" id="cat" />
            <label for="cat">고양이</label><br />
            <input type="radio" id="cow" />
            <label for="cow">소</label><br />
            <input type="radio" id="rabbit" />
            <label for="rabbit">토끼</label><br />
            <input type="radio" id="bear" />
            <label for="bear">곰</label><br />
          </fieldset>

          <fieldset>
            <legend><h3>좋아하는 색깔</h3></legend>
            <label for="color">색깔을 골라주세요^^ : </label>
            <input type="color" id="color" />
          </fieldset>
          <br />

          <h3>자기 소개</h3>
          <textarea id="introduce" rows="3" cols="70">
안녕하세요, 저는 중부대학교 정보보호학과에 재학 중인 2학년 안성원이라고 합니다. 학교에서 마주치면 웃는 얼굴로 인사해요^^* </textarea
          ><br />
        </form>
      </div>
    </section>
    <!-- js는 보통 body 맨 밑줄에서 링크 -->
    <script src="main.js"></script>
  </body>
</html>
