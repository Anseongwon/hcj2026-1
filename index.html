    <!-- css파일 링크하기 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 여기는 메뉴입니다 -->
    <nav class="navbar">
      <div class="container">
        <div class="logo">Webdemo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="about.html">About</a>
          </li>

          </li>
        </ul>
      </div>

    <!-- 메인 섹션 -->
    <section class="main">
      <div class="container">
        <h1>웹프로그래밍 ...web programming</h1>

        <h3>
          웹 개발자를 위한 온라인 메뉴얼 :
          <a href="https://www.w3schools.com/">
            w3schools: 웹프로그래밍 메뉴얼
          </a>
        </h3>
        <p>
          웹프로그래밍의 3가지 요소 :
          <a href="https://www.w3schools.com/html/default.asp">html5</a> |
          <a href="https://www.w3schools.com/css/default.asp">css3</a> |
          <a href="https://www.w3schools.com/js/default.asp">javascript</a>
        </p>

        <p>현재시간 : <span id="time"></span></p>
        <!-- 가로줄 긋기 -->
        <hr />

        <p>
          배경색 바꾸기 :
          <button onclick="pink()">Pink</button>
          <button onclick="lightblue()">Lightblue</button>
          <button onclick="yellow()">Yellow</button>
          <button onclick="reset()">Reset</button>
        </p>

        <p>
          배워봅시다 :
          <!-- alt+shift+방향키로 복사 -->
          <button onmouseover="showhtml()" onmouseout="hide()">HTML5</button>
          <button onmouseover="showcss()" onmouseout="hide()">CSS3</button>
          <button onmouseover="showjavascipt()" onmouseout="hide()">
            Javascript
          </button>
        </p>
        <hr />
        <br />
        <div>
          <img id="fig" height="200px" />
          <p id="desc"></p>
        </div>
      </div>
    </section>
    <!-- js는 보통 body 맨 밑줄에서 링크 -->
    <script src="main.js"></script>
  </body>
