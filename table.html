<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table,
      th,
      td {
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        상품 구성
      </caption>
      <tr>
        <th>용도</th>
        <th>중량</th>
        <th>개수</th>
        <th>가격</th>
      </tr>
      <tr>
        <td rowspan="2">선물용</td>
        <td>3kg</td>
        <td>5개</td>
        <td>15,000원</td>
      </tr>
      <tr>
        <td>4kg</td>
        <td>2개</td>
        <td>4,700원</td>
      </tr>
      <tr>
        <td rowspan="2">가정용</td>
        <td>10kg</td>
        <td>4개</td>
        <td>35,000원</td>
      </tr>
      <tr>
        <td>7kg</td>
        <td colspan="2">3개 7,800원</td>
      </tr>
    </table>
  </body>
</html>
