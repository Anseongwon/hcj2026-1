<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul style="list-style-type: circle">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ul>

    <ul style="list-style-type: square">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ul>

    <ul style="list-style-type: none">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ul>

    <ol type="a">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ol>

    <ol type="A">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ol>

    <ol type="i">
      <li>coffee</li>
      <li>tea</li>
      <li>milk</li>
      <li>juice</li>
    </ol>

    <dl>
      <dt>cafe menu</dt>
      <dd>coffee latte</dd>
      <dd>coffee</dd>
      <dt>drink menu</dt>
      <dd>tea</dd>
      <dd>milk</dd>
      <dd>juice</dd>
    </dl>
  </body>
</html>
